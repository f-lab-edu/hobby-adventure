spring:
  application:
    name: hobby-adventure
  datasource:
    url: jdbc:mysql://mysql:3306/hobby_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    driverClassName: com.mysql.cj.jdbc.Driver
    username: hobby_user
    password: hobby_pass

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

aws:
  s3:
    endpoint: ${AWS_S3_ENDPOINT}
    presign-endpoint: ${AWS_S3_PRESIGN_ENDPOINT}
    bucket: ${AWS_S3_BUCKET}
    region: ap-northeast-2
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    force-path-style: true
    create-bucket-on-startup: true

management:
  metrics:
    tags:
      application: ${spring.application.name}
